<!DOCTYPE html>
<html>
<head>
  <title>AI Summary</title>
</head>
<body>
    <style>
  body {
    font-family: Arial, sans-serif;
    min-width: 380px;
    min-height: 300px;
    margin: 0;
    padding: 16px;
    background: #f4f6f8;
  }

  h2 {
    margin: 0 0 12px;
    font-size: 18px;
    color: #1f2937;
  }

  .options {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  select {
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    outline: none;
  }

  button {
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
  }

  #summarize {
    background: #2563eb;
    color: white;
  }

  #summarize:hover {
    background: #1d4ed8;
  }

  #copy-btn {
    background: #10b981;
    color: white;
  }

  #copy-btn:hover {
    background: #059669;
  }

  #result {
    margin-top: 12px;
    padding: 12px;
    border-radius: 10px;
    background: white;
    border: 1px solid #e5e7eb;
    min-height: 180px;
    max-height: 300px;
    overflow-y: auto;
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.5;
  }

  .loading {
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .loader {
    width: 24px;
    height: 24px;
    border: 3px solid #ddd;
    border-top: 3px solid #2563eb;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    100% {
      transform: rotate(360deg);
    }
  }
</style>
  <h2>AI Summary</h2>

  <select id="summary-type">
    <option value="brief">Brief</option>
    <option value="detailed">Detailed</option>
    <option value="bullets">Bullets</option>
  </select>

  <button id="summarize">Summarize</button>
  <button id="copy-btn">Copy</button>

  <div id="result">Click summarize</div>

  <script src="popup.js"></script>
</body>
</html>
